name: AuthManager
version: BETA-1.4
main: me.stiglio.authManager.AuthManager
api-version: '1.21'
load: POSTWORLD
depend:
  - packetevents

libraries:
  - org.xerial:sqlite-jdbc:3.50.3.0
  - com.mysql:mysql-connector-j:8.4.0
  - org.postgresql:postgresql:42.7.4
  - com.zaxxer:HikariCP:5.1.0
  - com.google.code.gson:gson:2.13.2
  - org.mindrot:jbcrypt:0.4

commands:
  login:
    description: Logs in to your account
    usage: /login <password>
    aliases: [l]
  register:
    description: Registers a new account
    usage: /register <password> <confirmation>
    aliases: [reg]
  premium:
    description: Verifies and enables premium status
    usage: /premium
  unpremium:
    description: Disables premium status for your account
    usage: /unpremium
  changepassword:
    description: Changes your account password
    usage: /changepassword <old> <new> <confirmation>
    aliases: [cpass]
  logout:
    description: Logs out from the current session
    usage: /logout
    aliases: [lo]
  authstatus:
    description: Shows authentication and session security status
    usage: /authstatus
    aliases: [astatus]
  authadmin:
    description: AuthManager administrative commands
    usage: /authadmin <help|status|stats|db|lookup|reload|ratelimit|sessions|unlock|setpassword|forceauth|forceunauth|kickunauth|packet|player>
    aliases: [authctl, astadmin]

permissions:
  authmanager.admin:
    description: Allows usage of administrative AuthManager commands
    default: op
